<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourMagicCar - Pro Racing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-magic {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-magic:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .card-active {
            border: 2px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.1) !important;
        }

        #ui-layer {
            pointer-events: none;
        }
        
        #ui-layer * {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="menu" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass max-w-4xl w-full rounded-3xl p-8 shadow-2xl">
            <h1 class="orbitron text-4xl md:text-6xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                YourMagicCar
            </h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <!-- Selecție Mașină -->
                <div>
                    <h2 class="orbitron text-xl mb-4 text-blue-300">1. Alege Mașina</h2>
                    <div class="space-y-3" id="car-list">
                        <!-- Generat din JS -->
                    </div>
                </div>

                <!-- Selecție Nivel -->
                <div>
                    <h2 class="orbitron text-xl mb-4 text-purple-300">2. Alege Traseul</h2>
                    <div class="space-y-3" id="level-list">
                        <!-- Generat din JS -->
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <button onclick="initGame()" class="btn-magic orbitron bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-full text-2xl font-bold w-full md:w-auto">
                    PORNEȘTE MOTORUL
                </button>
                <p class="text-gray-400 text-sm italic">Folosește SĂGEȚILE sau WASD pentru control</p>
            </div>
        </div>
    </div>

    <div id="ui-layer" class="fixed inset-0 z-40 hidden">
        <div class="absolute top-6 left-6 flex flex-col gap-2">
            <div class="glass px-6 py-3 rounded-2xl">
                <div class="text-xs text-blue-300 uppercase font-bold">Timp</div>
                <div id="hud-timer" class="orbitron text-3xl">00:00.00</div>
            </div>
            <div class="glass px-6 py-3 rounded-2xl">
                <div class="text-xs text-purple-300 uppercase font-bold">Viteză</div>
                <div id="hud-speed" class="orbitron text-2xl">0 km/h</div>
            </div>
        </div>

        <div class="absolute top-6 right-6">
            <div class="glass px-6 py-3 rounded-2xl text-right">
                <div class="text-xs text-green-300 uppercase font-bold">Nivel curent</div>
                <div id="hud-level" class="orbitron text-xl text-white">Nume Nivel</div>
                <div id="hud-checkpoints" class="text-sm text-gray-400 mt-1 italic">Checkpoint 0/0</div>
            </div>
        </div>

        <div id="win-screen" class="absolute inset-0 flex items-center justify-center bg-black/80 hidden">
            <div class="glass p-12 rounded-3xl text-center max-w-sm">
                <h2 class="orbitron text-4xl text-yellow-400 mb-4">VICTORIE!</h2>
                <p id="win-stats" class="mb-8 text-gray-300"></p>
                <button onclick="location.reload()" class="btn-magic bg-blue-600 px-8 py-3 rounded-xl font-bold">MENIU PRINCIPAL</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const CONFIG = {
            cars: [
                { id: 'speed', name: 'Nitro Phantom', color: '#3b82f6', accel: 0.18, maxSpeed: 12, turn: 0.05, grip: 0.98, desc: 'Viteză extremă, greu de controlat.' },
                { id: 'drift', name: 'Neon Slider', color: '#a855f7', accel: 0.12, maxSpeed: 9, turn: 0.08, grip: 0.95, desc: 'Perfectă pentru curbe strânse.' },
                { id: 'tank', name: 'Iron Beast', color: '#10b981', accel: 0.15, maxSpeed: 7, turn: 0.04, grip: 0.99, desc: 'Accelerație constantă și stabilitate.' }
            ],
            levels: [
                { 
                    id: 0, 
                    name: 'Circuitul Speranței', 
                    bg: '#1e293b', 
                    offRoad: '#064e3b',
                    trackWidth: 100,
                    points: [[200, 200], [800, 200], [800, 600], [200, 600]], // Un oval simplu
                    laps: 1
                },
                { 
                    id: 1, 
                    name: 'Valea Șerpelui', 
                    bg: '#451a03', 
                    offRoad: '#271709',
                    trackWidth: 80,
                    points: [[100, 300], [400, 100], [800, 300], [900, 600], [500, 800], [200, 600]],
                    laps: 1
                },
                { 
                    id: 2, 
                    name: 'Mega City Night', 
                    bg: '#0f172a', 
                    offRoad: '#1e1b4b',
                    trackWidth: 70,
                    points: [[150, 150], [1000, 150], [1000, 400], [600, 400], [600, 800], [150, 800]],
                    laps: 1
                }
            ]
        };

        let state = {
            selectedCar: 0,
            selectedLevel: 0,
            isPlaying: false,
            timer: 0,
            startMs: 0,
            currentCheckpoint: 0,
            lap: 1,
            player: {
                x: 0, y: 0, angle: 0, speed: 0,
                inputs: { up: false, down: false, left: false, right: false }
            }
        };

        function setupUI() {
            const carList = document.getElementById('car-list');
            CONFIG.cars.forEach((car, index) => {
                const div = document.createElement('div');
                div.className = `glass p-4 rounded-xl cursor-pointer transition-all ${index === 0 ? 'card-active' : ''}`;
                div.id = `car-card-${index}`;
                div.onclick = () => {
                    document.querySelectorAll('[id^="car-card-"]').forEach(el => el.classList.remove('card-active'));
                    div.classList.add('card-active');
                    state.selectedCar = index;
                };
                div.innerHTML = `<div class="font-bold" style="color: ${car.color}">${car.name}</div><div class="text-xs text-gray-400">${car.desc}</div>`;
                carList.appendChild(div);
            });

            const levelList = document.getElementById('level-list');
            CONFIG.levels.forEach((lvl, index) => {
                const div = document.createElement('div');
                div.className = `glass p-4 rounded-xl cursor-pointer transition-all ${index === 0 ? 'card-active' : ''}`;
                div.id = `lvl-card-${index}`;
                div.onclick = () => {
                    document.querySelectorAll('[id^="level-card-"]').forEach(el => el.classList.remove('card-active'));
                    div.classList.add('card-active');
                    state.selectedLevel = index;
                };
                div.innerHTML = `<div class="font-bold text-white">${lvl.name}</div><div class="text-xs text-gray-400">Dificultate: ${index + 1}/3</div>`;
                levelList.appendChild(div);
            });
        }

        function initGame() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            
            const level = CONFIG.levels[state.selectedLevel];
            state.player.x = level.points[0][0];
            state.player.y = level.points[0][1];
            state.player.angle = Math.atan2(level.points[1][1] - level.points[0][1], level.points[1][0] - level.points[0][0]);
            state.player.speed = 0;
            state.currentCheckpoint = 0;
            state.startMs = Date.now();
            state.isPlaying = true;

            document.getElementById('hud-level').innerText = level.name;
            
            resize();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));

        function handleKey(e, val) {
            const keys = { 'ArrowUp': 'up', 'w': 'up', 'ArrowDown': 'down', 's': 'down', 'ArrowLeft': 'left', 'a': 'left', 'ArrowRight': 'right', 'd': 'right' };
            if (keys[e.key]) state.player.inputs[keys[e.key]] = val;
        }

        function update() {
            if (!state.isPlaying) return;

            const car = CONFIG.cars[state.selectedCar];
            const level = CONFIG.levels[state.selectedLevel];
            const p = state.player;

            // Fizica de bază
            if (p.inputs.up) p.speed += car.accel;
            if (p.inputs.down) p.speed -= car.accel * 0.5;

            // Verificare Off-Road (Simplificată prin distanța față de segmentul de drum)
            let onTrack = isPlayerOnTrack();
            let currentMaxSpeed = onTrack ? car.maxSpeed : car.maxSpeed * 0.3;
            let currentFriction = onTrack ? car.grip : 0.85;

            p.speed *= currentFriction;
            if (p.speed > currentMaxSpeed) p.speed = currentMaxSpeed;
            if (p.speed < -currentMaxSpeed/2) p.speed = -currentMaxSpeed/2;

            if (Math.abs(p.speed) > 0.1) {
                const turnFactor = p.speed > 0 ? 1 : -1;
                if (p.inputs.left) p.angle -= car.turn * turnFactor;
                if (p.inputs.right) p.angle += car.turn * turnFactor;
            }

            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;

            // Checkpoint Logic
            checkProgress();

            // UI Update
            const elapsed = (Date.now() - state.startMs) / 1000;
            document.getElementById('hud-timer').innerText = elapsed.toFixed(2) + "s";
            document.getElementById('hud-speed').innerText = Math.round(Math.abs(p.speed) * 25) + " km/h";
            document.getElementById('hud-checkpoints').innerText = `Progres: ${state.currentCheckpoint}/${level.points.length}`;
        }

        function isPlayerOnTrack() {
            const level = CONFIG.levels[state.selectedLevel];
            for (let i = 0; i < level.points.length; i++) {
                const p1 = level.points[i];
                const p2 = level.points[(i + 1) % level.points.length];
                const d = distToSegment({x: state.player.x, y: state.player.y}, {x: p1[0], y: p1[1]}, {x: p2[0], y: p2[1]});
                if (d < level.trackWidth / 2) return true;
            }
            return false;
        }

        function checkProgress() {
            const level = CONFIG.levels[state.selectedLevel];
            const nextIdx = (state.currentCheckpoint + 1) % level.points.length;
            const target = level.points[nextIdx];
            
            const d = Math.hypot(state.player.x - target[0], state.player.y - target[1]);
            if (d < level.trackWidth) {
                state.currentCheckpoint = nextIdx;
                if (nextIdx === 0) {
                    winGame();
                }
            }
        }

        function winGame() {
            state.isPlaying = false;
            document.getElementById('win-screen').classList.remove('hidden');
            const elapsed = (Date.now() - state.startMs) / 1000;
            document.getElementById('win-stats').innerText = `Ai terminat ${CONFIG.levels[state.selectedLevel].name} în ${elapsed.toFixed(2)} secunde cu mașina ${CONFIG.cars[state.selectedCar].name}!`;
        }

        function draw() {
            const level = CONFIG.levels[state.selectedLevel];
            const car = CONFIG.cars[state.selectedCar];
            
            // Fundal Off-Road
            ctx.fillStyle = level.offRoad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenare Traseu
            ctx.strokeStyle = level.bg;
            ctx.lineWidth = level.trackWidth;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();
            level.points.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p[0], p[1]);
                else ctx.lineTo(p[0], p[1]);
            });
            ctx.closePath();
            ctx.stroke();

            // Linie de start și Checkpoints (vizibile pentru debug/ghidaj)
            ctx.setLineDash([5, 15]);
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);

            // Desenare Jucător
            ctx.save();
            ctx.translate(state.player.x, state.player.y);
            ctx.rotate(state.player.angle);
            
            // Umbra
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.fillRect(-22, -8, 44, 20);

            // Corp Mașină
            ctx.fillStyle = car.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = car.color;
            ctx.beginPath();
            ctx.roundRect(-20, -10, 40, 20, 5);
            ctx.fill();
            
            // Detalii (Cockpit)
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(-5, -7, 12, 14);
            
            // Faruri
            ctx.fillStyle = "white";
            ctx.fillRect(15, -9, 4, 3);
            ctx.fillRect(15, 6, 4, 3);

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            if (state.isPlaying) requestAnimationFrame(gameLoop);
        }

        // Helper distanță punct-segment
        function distToSegment(p, v, w) {
            const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
            if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        setupUI();
    </script>
</body>
</html>
